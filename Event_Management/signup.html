<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container1">
        <div class="container">
            <div>
                <h3>SIGN UP</h3>
            </div>
            <div class="info">
                Username : <input type="text" id="uname">
                <span class="err"></span>
                Email : <input type="email" id="ename">
                <span class="err"></span>
                Password : <input type="password" id="pwd">
                <span class="err"></span>
                Confirm Password : <input type="password" id="cpwd">
                <span class="err"></span>
            </div>
            <div>
                <button type="button" id="btn">Create Account</button>
            </div>
            <div class="success">
                <h4>Successfully signup!</h4>
            </div>
            <div class="last">
                <p>Already have account?</p>
                <p id="login">Login</p>
            </div>
        </div>
    </div>
    <script src="signup.js"></script>
</body>
</html>
